spring:
  application:
    name: mockbean
  datasource:
    url: jdbc:postgresql://localhost:5432/mockbean_db
    username: mockbean_user
    password: mockbean_password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
langchain4j:
  ollama:
    chat-model:
      base-url: http://localhost:11434
      model-name: llama3.1
      temperature: 0.0
    embedding-model:
      base-url: http://localhost:11434
      model-name: nomic-embed-text
  pgvector:
    host: localhost
    port: 5432
    database: mockbean_db
    user: mockbean_user
    password: mockbean_password
    table: embeddings
    dimension: 768