langchain4j:
  open-ai:
    chat-model:
      # Gemini exposes an OpenAI-compatible endpoint — no extra dependency needed
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      api-key: ${GOOGLE_API_KEY:missing-key}
      model-name: gemini-2.5-flash
      temperature: 0.0
  # Embeddings still use local Ollama — no cost, no latency hit
  ollama:
    embedding-model:
      base-url: http://localhost:11434
      model-name: nomic-embed-text
    # Disable Ollama chat model auto-config so it doesn't conflict with Gemini bean
    chat-model:
      enabled: false
