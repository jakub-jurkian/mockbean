services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mockbean-db
    environment:
      POSTGRES_USER: mockbean_user
      POSTGRES_PASSWORD: mockbean_password
      POSTGRES_DB: mockbean_db
    ports:
      - "5432:5432"
    volumes:
      - mockbean-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  mockbean-data: